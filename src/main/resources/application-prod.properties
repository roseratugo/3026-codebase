# --- Database ---
datasource.driver-class-name=org.postgresql.Driver
datasource.url=jdbc:postgresql://postgres:5432/3026db
datasource.username=${DB_USERNAME}
datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

# --- SSL disabled (handled by Cloudflare Tunnel) ---
server.ssl.enabled=false

# --- RabbitMQ ---
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.ssl.enabled=false

exchange.main.name=codinggame

# --- Gameplay ---
codinggame.scheduled.resource=300000
codinggame.base.rate.limit=1000
codinggame.gameplay.default.resource.quotient=100
codinggame.gameplay.default.money=200.0

# --- Mail ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Security ---
admin.secret.key=${ADMIN_SECRET_KEY}
admin.account.creation.secret.code=${ADMIN_SIGNUP_CODE}
